name: cvat2ultralytics test

on:
  push:
    paths:
      - 'src/kabr_tools/cvat2ultralytics.py'
      - 'src/kabr_tools/__init__.py'
      - 'tests/test_cvat2ultralytics.py'
      - 'tests/utils.py'
      - 'ethogram/label2index.json'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/cvat2ultralytics.yml'
  pull_request:
    paths:
      - 'src/kabr_tools/cvat2ultralytics.py'
      - 'src/kabr_tools/__init__.py'
      - 'tests/test_cvat2ultralytics.py'
      - 'tests/utils.py'
      - 'ethogram/label2index.json'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/cvat2ultralytics.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        python -m pip install hatchling 
        python -m pip install --no-build-isolation .
    - name: Running unit tests
      shell: bash
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN_TESTING }}
      run: |
        mkdir /tmp/test
        cd /tmp/test
        python -m unittest discover -s "$GITHUB_WORKSPACE/tests" -p "test_cvat2ultralytics.py" -t "$GITHUB_WORKSPACE"

