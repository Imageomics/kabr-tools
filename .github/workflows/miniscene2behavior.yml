name: miniscene2behavior test

on:
  push:
    paths:
      - 'src/kabr_tools/miniscene2behavior.py'
      - 'src/kabr_tools/utils/slowfast/**'
      - 'tests/test_miniscene2behavior.py'
      - 'tests/utils.py'
      - '.github/workflows/miniscene2behavior.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        python -m pip install hatchling 
        python -m pip install --no-build-isolation .
    - name: Running unit tests
      shell: bash
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN_TESTING }}
      run: |
        mkdir /tmp/test
        cd /tmp/test
        python -m unittest discover -s "$GITHUB_WORKSPACE/tests" -p "test_miniscene2behavior.py" -t "$GITHUB_WORKSPACE"
